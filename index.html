<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Student CRUD</title>
</head>
<body>
    <section class="bg-primary text-white p-4">
        <h1>Student Info</h1>
    </section>
    <div class="container-fluid mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <form id="stdForm">
                            <div class="form-group">
                                <label for="fname">First Name</label>
                                <input type="text"
                                        id="fname"
                                        class="form-control"/>
                            </div>
                            <div class="form-group">
                                <label for="lname">Last Name</label>
                                <input type="text"
                                        id="lname"
                                        class="form-control"/>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email"
                                        id="email"
                                        class="form-control"/>
                            </div>
                            <div class="form-group">
                                <label for="contact">Contact</label>
                                <input type="text"
                                        id="contact"
                                        class="form-control"/>
                            </div>
                            <button class="btn btn-primary d-sm w-100 mt-3" id="addstdbtn">Add Student</button>
                            <button type="button" class="btn btn-primary d-sm w-100 mt-3 d-none" id="updatebtn">update Student</button>

                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>Sr No.</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Contact</th>
                                    <th>Edit</th>
                                    <th>Remove</th>
                                </tr>
                            </thead>
                            <tbody id="formContainer">
                                <!-- <tr>
                                    <td>1</td>
                                    <td>jhon Doe</td>
                                    <td>jhon@gmail.com</td>
                                    <td>6576973878</td>
                                    <td>
                                        <i class="fa-solid fa-pen-to-square fa-2x text-primary"></i>
                                    </td>
                                    <td>
                                        <i class="fa-solid fa-trash-can fa-2x text-danger"></i>
                                    </td>
                                </tr> -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./assets/js/app.js"></script>
</body>
</html>
